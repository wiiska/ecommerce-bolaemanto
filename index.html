<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bola e Manto</title>
    <meta name="description"
        content="Compre camisetas de futebol personalizadas e oficiais no Bola e Manto. Encontre os melhores modelos para torcer com estilo!">

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">

    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/product-category.css">
    <link rel="stylesheet" href="./css/components/product-grid.css">
</head>

<body>
    <header class="header">
        <!-- Logo e navegação -->
        <h1 class="logo">
            <a href="/" title="Bola e Manto">
                <img src="./images/logo/logo.svg" alt="Bola e Manto">
            </a>
        </h1>
        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Infantil</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Menu secundário">
            <ul>
                <li><a href="#" aria-label="Nossas lojas">Nossas lojas</a></li>
                <li><a href="#" aria-label="Sobre">Sobre</a></li>
                <li><a href="#" aria-label="Minha conta">
                        <img src="./images/icons/user.svg" alt="Minha conta">
                    </a></li>
                <li><a href="#" aria-label="Ajuda">
                        <img src="./images/icons/help.svg" alt="Ajuda">
                    </a></li>
                <li><a href="#" aria-label="Carrinho">
                        <img src="./images/icons/cart.svg" alt="Carrinho">
                    </a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
            <!-- Seção hero -->
            <div class="hero-overlay">

                <div class="hero-content">
                    <span class="hero-subtitle">Novidades para você</span>
                    <h2 class="hero-title">Encontre as melhores peças do seu time do coração!</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="categories">
            <!-- Seção de categorias de camisetas -->
            <div class="category-card casual">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Brasil</span>
                </a>
            </div>
            <div class="category-card esporte">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Mundo</span>
                </a>
            </div>
            <div class="category-card futurista">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Seleções</span>
                </a>
            </div>
            <div class="category-card colorido">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Retro</span>
                </a>
            </div>
        </section>

        <section class="product-grid">
            <!-- Grid com produtos em destaque -->
            <div class="card top1">
                <div class="top1-content">
                    <h3 class="card-title">Krypton One</h3>
                    <p class="card-subtitle">Estilo Urbano com atitude</p>
                    <div class="cta-group">
                        <a class="btn btn-outline" href="#">Feminino</a>
                        <a class="btn btn-outline" href="#">Masculino</a>
                    </div>
                </div>
            </div>
            <div class="card top2">
            </div>
            <div class="card midL">
            </div>
            <div class="card midR">
            </div>
            <div class="card bottomL">
            </div>
            <div class="card bottomR">
            </div>
        </section>
    </main>
    <footer class="footer">
        <!-- Footer com informações de contato e links -->
    </footer>
</body>

</html>
